version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: interniq-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: internship-tracker

  backend:
    build: .
    container_name: interniq-backend
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/internship-tracker
      - JWT_SECRET=${JWT_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo-data:
